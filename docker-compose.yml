services:
  buffer:
    build: .
    container_name: claudecode2api-buffer
    restart: unless-stopped
    network_mode: host
    volumes:
      - buffer-data:/data
      - ./config:/config
    env_file:
      - .env
    environment:
      - SESSION_FILE=/data/session.json
      - SYSTEM_PROMPT_FILE=/config/system-prompt.md

volumes:
  buffer-data:
